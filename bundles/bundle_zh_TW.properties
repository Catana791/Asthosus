## Mod info

## mod.asthosus.name = 阿斯托薩斯
## mod.asthosus.description = 該模組新增了一顆星球：阿斯托薩斯。\n\n\
## 阿斯托薩斯是一顆淒涼的星球、到處都是威脅的荒地。該模組包含11張主線戰役和21張可選額外關卡。\n\n\
## 除此之外，還有超過180項包含方塊、物品、液體、方塊、單位和狀態效果在內的獨創內容。不包含非玩家可控## 單位和環境方塊等。\n\n\
## 我的目標是幾乎不使用任何原版內容，而是全新又(希望是)令人興奮的東西來完善整個模組。\n\n\
## 該模組使用由 ThePythonGuy3 製作的新原創BGM。\n\n\
## 如果您有任何問題、錯誤回報、或需要如何攻略的協助，歡迎隨時加入這個模組的 Discord 伺服器。\n\n\
## 阿斯托薩斯目前提供以下語言的翻譯：\n \
##  - English \n - German \n - Indonesian \n - Russian \n - Ukrainian \n - 繁體中文 \n - Simplified Chinese \n\n\
## 好好享受吧！
## mod.asthosus.subtitle = 現在重晶含量增加了 68.99%！


## Sectors & Objectives - Campaign

## These objectives is used in multiple sectors
objective.read = [accent]請仔細閱讀核心附近的指引！
objective.warn = [red]警告！！！
objectives.production1 = [accent]一階單位[] 將於 [lightgray]{0}[] 後開始生產
objectives.production2 = [accent]二階單位[] 將於 [lightgray]{0}[] 後開始生產
objectives.production3 = [accent]三階單位[] 將於 [lightgray]{0}[] 後開始生產
objectives.production4 = [accent]四階單位[] 將於 [lightgray]{0}[] 後開始生產
objectives.danger = [red]危險！[]\n[accent]五階單位[] 將於 [lightgray]{0}[] 後開始生產

## Genesis

sector.asthosus-19s-01-genesis.name = 起始之地
sector.asthosus-19s-01-genesis.description = 一個名為阿斯托薩斯的星球上，你降落在一個峽谷中，四周只有少量的 [accent]赤鐵礦[] 以及 [accent]鋰輝石[]。\n\n你是否能在這個星球生存並徹底征服它？\n 

genesis.ferrinite = 歡迎來到阿斯托薩斯。\n\n從 \ue875 科技樹中研究並建造4個 [accent]小型赤鐵挖掘機[] 。\n\n小型赤鐵挖掘機必須蓋在面對淺灰色牆壁的方向。\n\n深灰色的牆壁因為過於陳舊，無法利用小型赤鐵挖掘機挖掘。\n\n使用 [accent]赤鐵傳輸帶[] 將挖掘機挖掘的資源送至核心。
genesis.demetite = 從 \ue875 科技樹中研究並建造4個 [accent]小型輝石挖掘機[] 以繼續。\n\n小型輝石挖掘機必須蓋在面對淺色砂質牆壁的方向。\n\n深色砂質的牆壁因為過於陳舊而無法利用小型輝石挖掘機挖掘。\n\n使用 [accent]赤鐵傳輸帶[] 將挖掘機挖掘的資源送至核心。
genesis.walls = 敵人即將抵達！\n\n移動至敵人空降區域並建造一些 [accent]赤鐵牆[] 以繼續。
genesis.catapults = 赤鐵牆並沒有辦法抵禦敵人太久。\n\n從 \ue875 科技樹中研究並建造3個 [accent]投擲砲[] 。\n\n使用赤鐵礦或鋰輝石當作彈藥，並用赤鐵傳輸帶將其運至砲台。

## Ignition

sector.asthosus-19s-02-ignition.name = 火苗
sector.asthosus-19s-02-ignition.description = 痕量的 [accent]褐煤[] 在火山作用下生成於地表。\n\n研究最基本的電力相關設施。\n 

ignition.power = \ue810 電力在阿斯托薩斯中非常重要。\n\n從 \ue875 科技樹中研究 [accent]微型採石場[] ，並建造3個在指定地點上。
ignition.generator = 從 \ue875 科技樹中研究 [accent]點火發電機[] 。\n\n建造1個在指定地點上，並將微型採石場挖掘到的褐煤運輸至點火發電機中。
ignition.connect = 從 \ue875 科技樹中研究 [accent]赤鐵電線[] 。n\n用其連接點火發電機與核心旁的修復投影機。
ignition.enemies = 敵人已經感知到你的存在了！防禦這個區域。\n\n利用這個機會熟悉阿斯托薩斯的電力系統。
ignition.alert = [red]敵人接近中！防禦這個區域！

## Lattice

sector.asthosus-19s-03-lattice.name = 晶格
sector.asthosus-19s-03-lattice.description = 零散的礦物點綴這個區域。\n\n快速擴張你的領土，避免遭受敵人的襲擊。\n\n研究並使用 [accent]磁石[] 以抵禦敵人的攻擊。\n 

lattice.lodestone = 磁石在阿斯托薩斯中是一項非常重要的資源。\n\n先從沙漠地形中用微型採石場取得 [accent]粗砂[] 以研究 [accent]磁石混合器[] 。\n\n從 \ue875 科技樹中研究並建造一個 [accent]磁石混合器[] 。 
lattice.produce = 將赤鐵礦以及粗砂運輸至磁石混合器以獲得 [accent]磁石[] 。 
lattice.enemies = 敵人接近中！利用新的科技防禦核心以及佔領───\n\n[ 啟動自動廣播 ]\n\n請立即離開這個區域。此地由 [red]BRT-3分部[] 管轄.\n\n[ 關閉自動廣播 ]

## Fulge

sector.asthosus-19s-04-fulge.name = 突破口
sector.asthosus-19s-04-fulge.description = 你降落在一個很小的區域。\n\n這是一個絕佳的機會去研究並使用 [accent]鋰[]，生產它並擊敗敵人。\n\n一場強大的地磁風暴正肆虐著，同時影響你和敵人。\n\n\
[blue]戰役修改：\n - 敵人造成的傷害增加 10%。\n - 敵人的生命值增加 25%。\n - 你的建築物生命減少 15%。\n 

fulge.lithium = 鋰在許多建築中扮演重要的角色。\n\n從 \ue875 科技樹中研究並建造一個 [accent]鋰研磨器[] 。
fulge.create = 將鋰輝石以及褐煤運輸至鋰研磨器以獲得 [accent]鋰[] 。
fulge.enemies = 繼續生產更多的鋰並研究其相關科技。\n\n敵人已經發現你的存在，保護好自己！
fulge.incoming = [red]敵人接近中！

## Immist

sector.asthosus-19s-05-immist.name = 霧地
sector.asthosus-19s-05-immist.description = 敵人已經在這片沙漠之地扎根並建造防線。\n\n當你降落在此地的瞬間，敵人便馬上感應到你的存在並試著驅逐入侵者。\n\n研究單位組裝工廠並施予反擊，消滅任何敵方的立足之地。\n 

immist.ground = 砲台在這個區域不適合攻擊敵人的基地，只有單位才能突破防禦。\n\n從 \ue875 科技樹中研究 [accent]地面單位組成工廠[] 以製造單位。
immist.shiv = 單位需要由多個元件組成才能運作。\n\n這些元件可以由 [accent]元件合成器[] 製造。\n\n製造6個單位「刀刃」以繼續。
immist.command = 單位需要適當的指揮才能發揮最大效益。\n\n \
按住 [accent]shift+左鍵[] 並拖曳一個區域以選擇區域內的所有單位。\n\n \
按住 [accent]shift+右鍵[] 讓選擇的單位移動到指定區域。\n\n \
[accent]Shift + G[] 可以選擇地圖上所有友方單位。\n\n \
[accent]Shift + H[] 可以選擇地圖上所有友方單位組成工廠。\n\n利用以上指令讓你的單位可以突破敵人的防線。
immist.constituent = 二階以上的單位必須使用 [accent]組成模塊[] 才能製造。\n\n組成模塊放置時需朝向並貼齊組成工廠的方框才能運作。\n\n\
製作二階單位需要 [accent]基礎組成模塊[] ，製作三階單位需要 [accent]基礎組成模塊[] 加上 [accent]進階組成模塊[] ，以此類推。\n\n高階單位所需的元件需要由更高階的元件合成器才能製造。
immist.skills = 你現在已經知道如何製造單位，以及使用組成模塊製造更強的單位。\n\n利用以上知識擊破敵人的基地。\n\n記住，單位並不是愈多愈好。
## immist.????? = 敵方將在 [stat]{0} 後擴大單位生產規模。

## Igneous Peaks

sector.asthosus-19s-06-igneous-peaks.name = 火山口
sector.asthosus-19s-06-igneous-peaks.description = 這個區域涵蓋一些高溫的地形，包含熔渣以及新的資源供玩家使用： [accent]黑曜石[]。\n\n製作 [accent]黑曜石[] 並用它擊敗此地的守護者。\n 

igneouspeaks.obsidian = [accent]黑曜石[] 在許多進階建築中扮演重要的角色。\n\n其中間產物 [accent]結晶體[] 只能使用小型或更高階的採石場才能挖掘。\n\n在黑曜石地形中找到結晶體的礦脈，並在上面建造小型採石場以獲得結晶體。\n\n獲得結晶體後，從 \ue875 科技樹中研究 [accent]結晶粉碎機[] ，將結晶體加壓後粉碎成可以使用的黑曜石。

## Detriment Valley

sector.asthosus-19s-07-detriment-valley.name = 隕石峽谷
sector.asthosus-19s-07-detriment-valley.description = 一個經歷多次轟炸的區域，敵人在此集結強大的勢力。\n\n嘗試探索並生產新的礦物： [accent]重晶石[]。\n\n研發重晶石科技、建立更強大的防禦並抵禦嘗試佔領此地的敵軍。\n\n\
[blue]戰役修改：\n - 敵人的生命值增加 15%。\n - 敵人造成的傷害增加 15%。\n - 敵人的移動速度增加 10%。\n 

detrimentvalley.barite = [accent]重晶石[] 存在於高放射性地形中。要獲得重晶石，先在高放射性地形中的白色區域，用大型或更高階的採石場挖掘 [accent]放射混合物[] 。\n\n獲得放射混合物後，研究 [accent]重晶石研磨器[] 將獲得的放射混合物研磨成更高純度的重晶石。
detrimentvalley.creatures = 阿斯托薩斯孕育著許多有機生物。\n\n它們會從巢穴中生成。\n\n巢穴可以在相對應的地形中發現。 
detrimentvalley.creatureslocate = [accent]重晶生物將在[] [lightgray]{0}[] [accent]後發現你！[]

## Synthesis Facility (No Objectives)

sector.asthosus-19s-09-synthesis-facility.name = 合成設施
sector.asthosus-19s-09-synthesis-facility.description = 敵人正從兩處慢慢逼近。\n\n嘗試研究 [accent]綠曜石[] 相關科技，並守護這個區域避免被敵人佔領。\n 

## Defringe (No Objectives)

sector.asthosus-19s-08-defringed-webbery.name = 幽暗之地
sector.asthosus-19s-08-defringed-webbery.description = 這裡聳立著一座古老的生產基地，有千年之久的歷史。修復重建這些設施，並且運用 [accent]鋇導體[] 建立防線。\n\n別被只有九波的敵人矇騙了：隨著波次增加，敵人的強度也以指數性快速成長。\n\n善加利用被破壞後留下的遺跡，重新利用他們穩定自己的勢力。擊敗這個區域強大的守護者。\n\n\
[blue]戰役修改：\n - 敵人裝備了速度提升裝置。\n - 太陽發熱電板不可使用。\n - 拆除建築回收的資源大幅減少。\n 

## Furnace Settlement (No Objectives)

sector.asthosus-19s-10-furnace-settlement.name = 熔爐之鄉
sector.asthosus-19s-10-furnace-settlement.description = 敵人在此處設立了一個非常堅固的基地。\n\n同時，敵人也設置了兩個單位生成點，他們最強大的軍隊奉命阻止你的進攻。\n\n嘗試研究 [accent]鋇超導體[] 的相關科技，並把敵人的基地摧毀殆盡。\n 

## Omega

sector.asthosus-19s-11-omega.name = 最終之站
sector.asthosus-19s-11-omega.description = 最遠也是最後的邊境地帶。\n\n敵人集結所有剩餘的軍隊，準備發動猛烈的攻擊。\n\n準備好從多個路線同時反擊。\n\n敵人已經在空頭位置建立龐大的基地，將他們一併摧毀。\n\n在展開攻擊之前，鞏固好自己基地的生產和安全或許是不錯的主意。\n 

omega.attackstart = 敵人將在 [accent]10分鐘[] 後開始 [red]波次進攻[]。\n\n敵人將在 [accent]15分鐘[] 後開始 [red]生產單位[]。
omega.basebusy = [red]敵人[] 正在忙碌中。\n下一波攻擊將會延遲，[accent]好好利用這段時間！[]\n\n⚠ 單位組裝工廠依然會正常出兵！ ⚠
omega.baseback = [red]敵人[] 做好了萬全準備。\n波次之間的攻擊間格將會縮短。\n\n[accent]務必謹慎應對！
omega.approaching = [red]⚠ 毀滅性的攻擊即將來臨！ ⚠[]
omega.traps = [red]敵人[] 引爆了 [accent]震撼地雷[]。\n\n你的所有 [accent]基礎設施[] 都受到 [red]相當嚴重[] 的損傷！


