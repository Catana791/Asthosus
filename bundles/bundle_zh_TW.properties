sector.asthosus-20t-01-maar.name = 瑪爾
sector.asthosus-20t-01-maar.description = 你降落在一個擁有大量 [accent]綠洲水[] 的區域，這是一個生產 [accent]磁石[] 的絕佳之地。\n\n\
[accent]備註：這是一個選擇性的區域，佔領與否並不影響此星球的戰役進度。\n 

## Chasm (No Objectives)

sector.asthosus-20t-02-chasm.name = 鴻溝
sector.asthosus-20t-02-chasm.description = 這個區域對於生產額外的 [accent]鋰[] 有幫助。\n\n\
[accent]備註：這是一個選擇性的區域，佔領與否並不影響此星球的戰役進度。\n 

## Inferate

sector.asthosus-20t-02-d-inferate.name = 因弗雷特
sector.asthosus-20t-02-d-inferate.description = 你偶然發現一個大型基地。\n\n在占領 [accent]霧地[] 之後，你並不曉得之後還會遭遇多少類似的基地。\n\n敵人的防禦呈現層狀結構，逐一將敵人的防線摧毀。\n\n\
[accent]備註：這是一個選擇性的區域，佔領與否並不影響此星球的戰役進度。\n 

inferate.production1 = [accent]一階單位即將來襲！
inferate.production2 = [accent]二階單位即將來襲！

## Embage (No Objectives)

sector.asthosus-20t-02-f-embage.name = 囹圄
sector.asthosus-20t-02-f-embage.description = 你身陷一個非常狹窄且封閉的地形，這裡充滿著未知的危險。\n\n敵人會無情的持續進攻，請在有限的空間下將敵人擊退。\n\n[accent]備註：這是一個選擇性的區域，佔領與否並不影響此星球的戰役進度。\n 

## Factory Unit 0047

sector.asthosus-20t-02-g-factory-unit-0047.name = 編號0047軍備工廠
sector.asthosus-20t-02-g-factory-unit-0047.description = 由阿魯米斯建造的眾多大型軍備工廠之一。\n\n這個基地已經被廢棄，大多的防禦設施也都停擺。\n\n不要放過敵人疏忽的機會。\n\n\
[blue]戰役修改：\n - 建造砲塔時射程內可以包含敵方建築。\n\n\
[accent]備註：這是一個選擇性的區域，佔領與否並不影響此星球的戰役進度。\n 

facunit.ground = [salmon]地面單位[] 將在 [lightgray]{0}[] 後開始生產。
facunit.support = [green]支援單位[] 將在 [lightgray]{0}[] 後開始生產。
facunit.tank = [yellow]坦克單位[] 將於 [lightgray]{0}[] 後開始生產。
facunit.emergency = [#9f77fc]緊急產線[] 將於 [lightgray]{0}[] 後擴增單位生產量。

## Barite Valley

sector.asthosus-20t-03-barite-valley.name = 重晶石峽谷
sector.asthosus-20t-03-barite-valley.description = 你發現了一個未經探索之地，這裡似乎有著奇怪的有機生命體。\n\n將這些異變的生命體全部消滅，建立一個立足點。\n\n\
[accent]備註：這是一個選擇性的區域，佔領與否並不影響此星球的戰役進度。\n 

baritevalley.threatinfo = 當你打倒重晶生物後，威脅等級也會隨之增加。
baritevalley.threat0 = [accent]威脅等級[]：0%
baritevalley.threat15 = [accent]威脅等級[]：[#ff7d7d]15%
baritevalley.threat45 = [accent]威脅等級[]：[#ff4a4a]45%
baritevalley.threat60 = [accent]威脅等級[]：[#ff3939]60%
baritevalley.warning = [red]警告！[]\n繼續攻擊重晶生物會更加刺激它們，請多加注意。
baritevalley.threat85 = [accent]威脅等級[]：[#ff2626]85%
baritevalley.aggresive = 由於重晶生物仰賴重晶石維生，\n開採重晶資源會導致該生物變得更具攻擊性。
baritevalley.threat100 = [accent]威脅等級[]：[scarlet]100%
baritevalley.warned = [scarlet]⚠ 你已經收到警告了 ⚠
baritevalley.more = [accent]更多重晶生物將在[] [lightgray]{0}[] [accent]後到來。[]
baritevalley.hordes = [accent]大量重晶生物將在[] [lightgray]{0}[] [accent]後到來。[]

## Lucila (No Objectives)

sector.asthosus-20t-03-c-lucila.name = 路西拉
sector.asthosus-20t-03-c-lucila.description = 就在你研究了所有 [accent]重晶石[] 相關的科技時，敵人趁你不備之時偷走了你的 [accent]重晶石研磨器[] 科技。\n\n取而代之，使用 [accent]重晶石冷卻器[] 製造 [accent]重晶石[]。使用更高階的單位將敵人眾多的基地摧毀。\n\n\
