## Memorial Recording

status.asthosus-25y-01-memorial-recording-1.name = 紀念石碑：起始之地
status.asthosus-25y-01-memorial-recording-1.description = 紀念石碑上記錄下的文字，以數位的形式保留下來。
status.asthosus-25y-01-memorial-recording-1.details = 很久以前，在賽爾普洛所在的行星系統之中，有那麼一個欣欣向榮，充滿海洋以及生物的星球，星球上的居民稱其為「阿斯托薩斯」。\n\n\
一個古老的文明座落其中，不過這裡的原住民並沒有拓展殖民地。他們所知的生物都是阿斯托薩斯上原生的。

status.asthosus-25y-02-memorial-recording-2.name = 紀念石碑：火苗
status.asthosus-25y-02-memorial-recording-2.description = 紀念石碑上記錄下的文字，以數位的形式保留下來。
status.asthosus-25y-02-memorial-recording-2.details = 儘管他們文武雙全，不過阿斯托薩斯的科技並沒有其他星球來的先進，他們最近才開發出星際旅行的方法。\n\n\
他們並不需要擔心太多，雖然有戰爭但是規模非常小。少數需要擔心的問題是略高的氣溫，因為這個星球比較靠近太陽。

status.asthosus-25y-03-memorial-recording-3.name = 紀念石碑：晶格
status.asthosus-25y-03-memorial-recording-3.description = 紀念石碑上記錄下的文字，以數位的形式保留下來。
status.asthosus-25y-03-memorial-recording-3.details = 另一個需要面對的問題來自於星球內兩派系的爭執：特魯米爾以及阿魯米斯。\n\n\
前者主張隨著科技的進步，人們只會過得愈來愈好，所以應該全力發展科技；後者認為維護生態比科技更重要，他們想要將生態恢復到星際旅行發明之前的樣子。

status.asthosus-25y-04-memorial-recording-4.name = 紀念石碑：突破口
status.asthosus-25y-04-memorial-recording-4.description = 紀念石碑上記錄下的文字，以數位的形式保留下來。
status.asthosus-25y-04-memorial-recording-4.details = 在發明星際旅行的幾年後，阿斯托薩斯人開始嘗試將這顆星球變得更適宜居住。他們在阿斯托薩斯的衛星：崔卡拉上進行實驗。\n\n\
原本並沒有大氣層的崔卡拉，在阿斯托薩斯人的發展下，也變成一顆適宜居住的衛星。

status.asthosus-25y-05-memorial-recording-5.name = 紀念石碑：霧地
status.asthosus-25y-05-memorial-recording-5.description = 紀念石碑上記錄下的文字，以數位的形式保留下來。
status.asthosus-25y-05-memorial-recording-5.details = 阿斯托薩斯人在崔卡拉上建造一個前哨站，以監測其母星球以及整個行星系統的動態。\n\n\
在前哨站設立的幾年後，另一個監測太陽輻射及熱能變化的研究所被設立。\n\n\
另外，在阿斯托薩斯和崔卡拉各設立了一個保護裝置，免於遭受來自其他勢力的侵襲。

status.asthosus-25y-06-memorial-recording-6.name = 紀念石碑：火山口
status.asthosus-25y-06-memorial-recording-6.description = 紀念石碑上記錄下的文字，以數位的形式保留下來。
status.asthosus-25y-06-memorial-recording-6.details = 因為崔卡拉的改造相當成功，阿斯托薩斯人也開始嘗試將大片海洋開發成適居地帶。\n\n\
當此計畫正在進行時，一股強力的太陽風席捲而來。崔卡拉很幸運的躲過這場風暴，不過阿斯托薩斯的命運卻截然不同...

status.asthosus-25y-07-memorial-recording-7.name = 紀念石碑：隕石峽谷
status.asthosus-25y-07-memorial-recording-7.description = 紀念石碑上記錄下的文字，以數位的形式保留下來。
status.asthosus-25y-07-memorial-recording-7.details = 在太陽風的作用下，用於地表改造的機器被破壞，並失去了控制，在不久後即將爆炸。\n\n\
幸運的是，在科學家的努力下，他們在最後一刻將機器發射到星球外，機器在太空中伴隨著火光化為數十萬個碎片。\n\n\
在這個事件下，阿魯米斯成功推翻特魯米爾的政權，成為唯一掌控阿斯托薩斯的勢力。

status.asthosus-25y-08-memorial-recording-8.name = 紀念石碑：幽暗之地
status.asthosus-25y-08-memorial-recording-8.description = 紀念石碑上記錄下的文字，以數位的形式保留下來。
status.asthosus-25y-08-memorial-recording-8.details = 幾百年過去，阿斯托薩斯和崔卡拉依舊保持著生意盎然，幾乎所有目擊到那場災難的人都已過世。\n\n\
因為阿魯米斯掌權的緣故，所有科技相關設施幾乎都已經荒廢。\n\n\
隨著時間的流逝，保護星球的設備已經年久失修，電力系統早已停擺。

status.asthosus-25y-09-memorial-recording-9.name = 紀念石碑：合成設施
status.asthosus-25y-09-memorial-recording-9.description = 紀念石碑上記錄下的文字，以數位的形式保留下來。
status.asthosus-25y-09-memorial-recording-9.details = 阿魯米斯為了確保政權，建立了可以破壞一切的大批軍隊。\n\n\
不過，在一場突如其來的太陽磁暴下，最後一個能保護星球的設備也被破壞，等待阿斯托薩斯人的是一場前所未有的危機。

status.asthosus-25y-10-memorial-recording-10.name = 紀念石碑：熔爐之鄉
status.asthosus-25y-10-memorial-recording-10.description = 紀念石碑上記錄下的文字，以數位的形式保留下來。
status.asthosus-25y-10-memorial-recording-10.details = 科學家們急忙嘗試從主星球的表面開始修復保護設施。\n\n\
不過，在一次修復過程中，因為意外引發了大規模的爆炸，夷平了數個城市。更糟糕的是，連生化武器庫和儲存設備也被破壞。\n\n\
爆炸所產生的輻射以及洩漏的生化病毒讓許多人民在痛苦中逝去。

status.asthosus-25y-11-memorial-recording-11.name = 紀念石碑：最終之站
status.asthosus-25y-11-memorial-recording-11.description = 紀念石碑上記錄下的文字，以數位的形式保留下來。
status.asthosus-25y-11-memorial-recording-11.details = 因為這些災難，阿斯托薩斯的大氣層完全被破壞，海洋也因高溫加上失去大氣層的保護而迅速蒸發。\n\n\
溫度迅速升高，阿斯托薩斯人卻無能為力，只能在這地獄般的環境慢慢等待死亡。\n\n\
最終，阿斯托薩斯變成一顆環境惡劣，毫無生氣的炎熱星球，阿斯托薩斯人的歷史也在此畫下句點。


## Resource Entry

status.asthosus-26z-01-item-tablet-ferrinite.name = 資源項目「赤鐵礦」
status.asthosus-26z-01-item-tablet-ferrinite.description = 產地：\n\n \
「貧瘠之地」是阿斯托薩斯上的其中一種生態域，與這顆星球的其他地區相比，這裡的環境相對穩定得多。\n \
這種生態域由大片的「粗砂」、少量「褐煤礦床」、「地熱坑口」和多個瀕死植物殘骸組成。\n \
雖然「貧瘠之地」並非完全沒有危險，但它為早期基地建設提供了相當安全的環境。\n\n\
成分：\n\n \
「赤鐵礦」是一種類似岩石的物質，由沙子和多種礦物層自然長期堆疊而成。\n \
阿斯托薩斯的高溫氣候，使這種結構隨著時間硬化成縝密的硬岩物質，並且成為建設初始建築最有用的材料。\n 
status.asthosus-26z-01-item-tablet-ferrinite.details = 項目 R-001：「赤鐵礦」運用報告\n\n \
「赤鐵礦」是「貧瘠之地」中最豐富的材料之一。\n \
「貧瘠之地」雖然乾燥貧瘠，但與阿斯托薩斯其它更加動盪、更加惡劣的環境相比，這裡可以說是相當的安定。\n \
「地熱坑口」和「褐煤礦床」的結合，形成了這種岩石狀物質，它是沙子和礦物質的結合物，經由漫長時間的推移而硬化。\n\n \
雖然「赤鐵礦」的硬度較低，不適合用於更高級的建築和長久使用的設備，但是它對於基地建設的初始階段是無價之寶。\n \
其豐富的產量和容易開採的特性，讓基地能夠快速擴張。\n \
隨著資源和技術的成長、更耐用的材料出現，「赤鐵礦」也會逐漸被取代。即使如此，它在許多由複雜材料構成的設備中，依然有莫大的作用。\n\n \
 - 特魯米爾 資源分析檔案 No.1

status.asthosus-26z-02-item-tablet-demetite.name = 資源項目「鋰輝石」
status.asthosus-26z-02-item-tablet-demetite.description = 產地：\n\n \
「貧瘠之地」是阿斯托薩斯上的其中一種生態域，這裡的「地熱坑口」和豐富的礦物層，成為形成「鋰輝石」的絕佳條件。\n \
這種金屬資源通常與「赤鐵礦」一起被發現，並且都產自相同資源豐富的地區。\n\n\
成分：\n\n \
「鋰輝石」是一種金屬材料，由多種礦物層在高壓下自然融合而成。\n \
其柔軟的金屬成分使其適合用於基礎建築，不過它的耐用性不足以單獨使用在高級建築上。\n 
status.asthosus-26z-02-item-tablet-demetite.details = 項目 R-002：「鋰輝石」運用報告\n\n \
「鋰輝石」是「貧瘠之地」經常發現的金屬資源之一，也是這個生態域中唯一可以應用在設備結構上的資源。\n \
它的金屬特性，讓它能夠在多個堅硬材料之間形成很好的緩衝結構，不過也意味著「鋰輝石」難以單獨應用。\n\n \
雖然「鋰輝石」礦源豐富、易於開採，但是它也缺乏長期使用設備必須的耐久性。\n \
它通常使用在基礎建築和機械的中間部件。\n \
隨著資源和技術的成長、更具彈性的材料出現，「鋰輝石」也會逐漸被取代。即使如此，用它製造的「動力關節」在最先進的單位也經常會用上。\n\n \
 - 特魯米爾 資源分析檔案 No.2

status.asthosus-26z-03-item-tablet-lignite.name = 資源項目「褐煤」
status.asthosus-26z-03-item-tablet-lignite.description = 產地：\n\n \
位於阿斯托薩斯的「貧瘠之地」和「荒漠」生態域。\n \
「褐煤」出現在曾經有植物茂密生長的岩壁附近，遠古時期有機物被掩埋後，隨著時間和壓力的變化而成。\n\n\
成分：\n\n \
「褐煤」是一種質量較差的類煤物質，由長期死亡的植物殘骸分解而成。\n \
其多孔易碎的結構使其易於點火，因此非常適合用於加熱和基本燃燒。\n 
status.asthosus-26z-03-item-tablet-lignite.details = 項目 R-003：「褐煤」運用報告\n\n \
「褐煤」通常存在於「貧瘠之地」和「荒漠」地表較淺的位置，並且靠近生態域中的岩壁。\n \
雖然阿斯托薩斯的植被幾乎滅絕，不過「褐煤」的存在，成為過去植物繁盛世代的有力證據。\n \
隨著時間過去，炎熱的環境和壓力將這些殘骸壓縮成易碎的深色燃料。\n\n \
它的火力並不是很強，但是易燃性和相對豐富的產量，讓它成為早期加熱與燃燒裝置最好的燃料來源。\n \
建議謹慎使用，因為它易於燃燒的特性，如果處理過程有所閃失就會引發事故。\n \
隨著建設作業擴展到更惡劣的環境，「褐煤」依舊能繼續作為更先進燃料技術的墊腳石、成為科技發展的一線希望。\n\n \
 - 特魯米爾 資源分析檔案 No.3

status.asthosus-26z-04-item-tablet-hardened-sand.name = 資源項目「粗砂」
status.asthosus-26z-04-item-tablet-hardened-sand.description = 產地：\n\n \
主要分佈於阿斯托薩斯的「荒漠」生態域。\n \
「粗砂」是由鬆散的沉積物持續暴露於高溫之下，隨著時間推移自然壓縮而成。\n\n\
成分：\n\n \
「粗砂」是沙子和沉積物在高溫下形成的。在這個過程下，「粗砂」的顆粒融合成更加緊密的材料。\n \
雖然它的強度不如其他岩石材料或金屬，不過它是精煉基礎建設資源的優良媒介。\n 
status.asthosus-26z-04-item-tablet-hardened-sand.details = 項目 R-004：「粗砂」運用報告\n\n \
「粗砂」最初被的表勘查人員給忽視，在長期高溫的環境下將沙子和沉積物壓縮成大型顆粒。\n \
它在「荒漠」生態域非常常見，整個生態域大部分的地面都是由「粗砂」構成。\n\n \
雖然與其它更加泛用的建設材料相比，它的可應用範圍相當有限，但它在原材料的二次加工中起到至關重要的角色。\n \
它的耐久性一般，不建議使用這種材料來建造建築，但它的便利性、以及作為加工媒介的作用，使其成為相當不錯的資源。\n\n \
 - 特魯米爾 資源分析檔案 No.4

status.asthosus-26z-05-item-tablet-red-sand.name = 資源項目「紅砂」
status.asthosus-26z-05-item-tablet-red-sand.description = 產地：\n\n \
只有分佈在阿斯托薩斯的「惡地」生態域裡。\n \
「紅砂」以其鮮豔的色彩和顆粒分明的組成，讓人非常容易辨識，通常覆蓋在該生態域的階梯式山坡和山谷。\n\n\
成分：\n\n \
「紅砂」由氧化的礦物顆粒和風化沉積物組成，含有多種元素物質的混合體。\n \
其顏色源自豐富的鐵含量，經過無數的高溫和風化循環而成。\n 
status.asthosus-26z-05-item-tablet-red-sand.details = 項目 R-005：「紅砂」運用報告\n\n \
「紅砂」覆蓋了「惡地」生態域絕大部分的地區，剩下的地方則由陶土和燒焦的「紅砂」組成。\n \
由於長期暴露在極端的高溫下，無法採集的「紅砂」成為了玻璃結構的物質。\n\n \
雖然「紅砂」本身的成分價值非常低，不過根據學者的深入解析，它含有微量的稀少元素，能夠在二次加工中發揮作用。\n \
它的作用更多是作為媒介而不是主要材料，提供更好的合成材料。\n \
由於在建設發展的使用量相對較低，「紅砂」在資源採集作業中通常會被忽視。但它能夠成為易燃和爆炸性強材料的媒介。\n\n \
 - 特魯米爾 資源分析檔案 No.5

status.asthosus-26z-06-item-tablet-lodestone.name = 資源項目「磁石」
status.asthosus-26z-06-item-tablet-lodestone.description = 產地：\n\n \
使用來自「貧瘠之地」和「荒漠」的原料，在專門的混合設施中製造而成。\n \
雖然阿斯托薩斯上存在著天然的「磁石」，不過目前還沒有採取技術，只能人工生產。\n\n\
成分：\n\n \
「磁石」是一種緻密的磁反應化合物，由緻密的礦物和沉積物材料混合而成。\n \
雖然磁化程度不如天然磁石，不過化合物本身具有一種相當穩定的結構、導電性，可用於自動化和運輸系統。\n 
status.asthosus-26z-06-item-tablet-lodestone.details = 項目 R-006：「磁石」運用報告\n\n \
跟許多直接從地表上採集的資源不同，「磁石」是一種人造材料───通過簡單的混合而不是開採來生產。\n \
透過將「粗砂」和「赤鐵礦」結合，形成一種平衡的化合物，具有基本的導電性和完整的結構。\n\n \
雖然製作過程很簡單，但「磁石」已經被證明，對於自動化系統和多數先進科技非常重要。\n \
它在支援控制機制和結構平衡方面的作用，使其成為生產和分發設施的關鍵部分。\n\n \
 - 特魯米爾 資源分析檔案 No.6

status.asthosus-26z-07-item-tablet-lithium.name = 資源項目「鋰」
status.asthosus-26z-07-item-tablet-lithium.description = 產地：\n\n \
通過工廠精煉而非開採蒐集的資源。\n \
「鋰」是由「鋰研磨器」生產───從「褐煤」和「鋰輝石」中提取精煉活性元素的設施。\n\n\
成分：\n\n \
一種柔軟、粉色的材料，具有高電荷電位和化學敏感性。\n \
將原始可燃金屬物質轉化為「鋰」的過程效能很好，不過由於涉及易燃物，加工過程必須密切監控。\n 
status.asthosus-26z-07-item-tablet-lithium.details = 項目 R-007：「鋰」運用報告\n\n \
與「磁石」類似，「鋰」是在遵守標準程序的加工設施中合成，而不是透過開採取得。\n \
透過高壓和研磨將「褐煤」和「鋰輝石」混合在一起，微量的活性元素被分離出來後重新組合，形成穩定可用的材料。\n \
最終獲得一種柔軟且具有電化學活性的化合物，對電子系統、中繼和儲存節點有相當大的作用。\n\n \
雖然「鋰」的爆炸風險較低，但它依然具有化學敏感性和帶電性。\n \
因此在儲存過程中必須嚴格遵守處理規範，以避免汙染或受熱。\n\n \
 - 特魯米爾 資源分析檔案 No.7

status.asthosus-26z-08-item-tablet-cretite.name = 資源項目「橙色火藥」
status.asthosus-26z-08-item-tablet-cretite.description = 產地：\n\n \
生產自「橙色火藥混合器」，這是一種專門的工業設備，用來將「褐煤」、「鋰」和「紅砂」混合在一起。\n \
最終形成一種揮發性複合材料，主要用於控制爆炸、或是密切管理的發電設施。\n\n\
成分：\n\n \
「橙色火藥」是一種化學性質活躍、極其不穩定的混合物，由「褐煤」、「鋰」和「紅砂」組成。\n \
這些元素成分在嚴格的配方管理下相互結合作用，形成一種易燃、略帶爆炸性的化合物。\n \
如果加以適當利用，「橙色火藥」擁有巨大的潛在能量。\n 
status.asthosus-26z-08-item-tablet-cretite.details = 項目 R-008：「橙色火藥」運用報告\n\n \
與阿斯托薩斯絕大多數的材料不同，「橙色火藥」被刻意設計成具有易揮發性。\n \
這種複合材料由「褐煤」、「鋰」和「紅砂」在「橙色火藥混合器」中混合而成，非常易燃並帶有些微爆炸性。\n \
雖然由於其性質，「橙色火藥」並不是使用在一般建設的建材。不過它在更專門的領域中卻非常有價值。\n\n \
其爆炸威力，可以在接受控制的爆破作業、和能源生產中使用。但處理這種材料時必須格外小心。\n \
即使是細小的火苗，都有可能導致災難性的後果。\n \
目前它的運用範圍仍然僅限受控制的精確操作，不適合使用在基地建設或單位生產。\n\n \
 - 特魯米爾 資源分析檔案 No.8

status.asthosus-26z-09-item-tablet-crystalline-geode.name = 資源項目「結晶體」
status.asthosus-26z-09-item-tablet-crystalline-geode.description = 產地：\n\n \
被發現於「火成岩」生態域周遭的地表，那裡地形崎嶇、充滿岩漿。\n \
這些「結晶體」位於生態域的邊緣地帶，這使得採集作業十分危險，但收穫也十分有價值。\n\n\
成分：\n\n \
「結晶體」由被一層「赤鐵礦」厚重包覆的「黑曜石」組成。\n \
周圍岩漿的劇烈熱量，加速了這種天然保護層的形成，並使得「結晶體」更難開採。\n 
status.asthosus-26z-09-item-tablet-crystalline-geode.details = 項目 R-009：「結晶體」運用報告\n\n \
「結晶體」通常能在「火成岩」生態域的岩漿流附近發現，周圍火山裂縫產生的高溫促使它們形成。\n \
這些「結晶體」由珍貴的資源「黑曜石」組成，外層包覆了厚重的「赤鐵礦」。\n \
雖然「赤鐵礦」外殼能夠保護「結晶體」，不受到惡劣的環境影響，不過也使得開採作業變得困難。\n\n \
粉碎「結晶體」是唯一獲得裡面「黑曜石」的方法，「黑曜石」是一種同時具有耐用性和高強度的珍貴資源。\n \
這些「結晶體」非常靠近岩漿，因此開採起來風險很大───需要縝密的計畫和合適的設備，以避免發生危險。\n \
這個地區的溫度，比阿斯托薩斯地表上任何地方都要來的高許多。\n\n \
 - 特魯米爾 資源分析檔案 No.9

status.asthosus-26z-10-item-tablet-obsidian.name = 資源項目「黑曜石」
status.asthosus-26z-10-item-tablet-obsidian.description = 產地：\n\n \
出產自「火成岩」生態域以及岩漿豐富的地帶。\n \
「黑曜石」無法直接開採，只能透過特殊的方式提取，例如粉碎「結晶體」或冷卻熔渣。\n\n\
成分：\n\n \
「黑曜石」是一種在極熱環境下自然形成的火山玻璃。由於其硬度和耐用性，它被廣泛用於高級建築和設施。\n 
status.asthosus-26z-10-item-tablet-obsidian.details = 項目 R-010：「黑曜石」運用報告\n\n \
「黑曜石」是阿斯托薩斯上最耐用的材料之一，其強度和實用性使其備受關注、並經常使用在進階建設中。\n \
與其他資源不同，「黑曜石」無法直接開採，而是必須透過粉碎「結晶體」、或是從岩漿中抽取熔渣冷卻。\n \
冷卻後產生出固化的「黑曜石」，才能夠收穫。\n\n \
盡管「黑曜石」在「火成岩」生態域中含量豐富，但取得「黑曜石」的過程非常危險，周圍的岩漿對於設備和運輸是一大麻煩。\n \
然而，一旦取得「黑曜石」，就能將其運用在高級建築和科技上。\n\n \
 - 特魯米爾 資源分析檔案 No.10

status.asthosus-26z-11-item-tablet-irradiated-lump.name = 資源項目「放射混合物」
status.asthosus-26z-11-item-tablet-irradiated-lump.description = 產地：\n\n \
通常被發現於「輻射遼原」生態域，這是一個廣闊且危險的生態域，天然輻射充斥著整個環境。\n \
這個區域的放射性材料儲量非常豐富，但與之接觸極為危險。\n\n\
成分：\n\n \
「放射混合物」是一種放射性礦物，其原始型態沒有任何價值。\n \
由於其強烈的輻射，在沒有適當防護的措施下處理起來非常危險，而且也不能直接使用在建築或生產上。\n \
其結構多孔且易碎。\n 
status.asthosus-26z-11-item-tablet-irradiated-lump.details = 項目 R-011：「放射混合物」運用報告\n\n \
「放射混合物」是一種礦物，產於廣闊又危險的「輻射遼原」生態域───這是一個天然輻射滲透到整個土地的區域。\n \
盡管這種材料具有耐久度和放射性，但它在原礦型態下基本無法使用。其輻射能量對採集和加工的人員、有相當大的危害。\n\n \
然而，如果加工處理得當，混合物能夠轉化為「重晶石」，一種穩定的又能安全使用的高價材料。\n \
「輻射遼原」生態域以其廣大的輻射土地和裸露的放射礦脈聞名，它所帶來的危險使得任何開採作業都需要謹慎嚴密的計畫。\n\n \
 - 特魯米爾 資源分析檔案 No.11

status.asthosus-26z-12-item-tablet-barite.name = 資源項目「重晶石」
status.asthosus-26z-12-item-tablet-barite.description = 產地：\n\n \
這種材料主要產自「輻射遼原」生態域，是「放射混合物」的精煉產物。\n \
由專門設計的設備加工而成，以應對材料自身的危險特性。\n\n\
成分：\n\n \
「重晶石」是一種高放射性礦物，在高級設施、發電和加工流程中有著廣泛的應用。\n \
它是一種緊密耐用的高級資源，在開發更先進的技術和結構有者極為重要的作用。\n \
這種材料以其高放射性聞名，根據使用方式的不同，既寶貴又危險。\n 
status.asthosus-26z-12-item-tablet-barite.details = 項目 R-012：「重晶石」運用報告\n\n \
「重晶石」是「輻射遼原」生態域最珍貴的材料之一。\n \
透過「放射混合物」加工而成，它是構成高級建設、零件、以及特殊加工技術的重要資源。\n\n \
盡管「重晶石」用途廣泛，不過它的高放射性給倉儲和運用帶來了挑戰。謹慎管理輻射非常重要，避免暴露於過多輻射導致健康問題。\n \
由於「重晶石」耐用程度和巨大的能源潛力，預計將廣泛將其應用到高科技建築和更先進的能源系統中。\n\n \
 - 特魯米爾 資源分析檔案 No.12

status.asthosus-26z-13-item-tablet-crosium.name = 資源項目「綠曜石」
status.asthosus-26z-13-item-tablet-crosium.description = 產地：\n\n \
「綠曜石」是由「綠曜石合成器」製作，將「黑曜石」、「氣壓」和「淨化綠洲水」在受控環境下混合。\n \
這種獨特的加工技術，使材料具備在高級建設和單位中備受重視的特性。\n\n\
成分：\n\n \
「綠曜石」是一種用途廣泛的材料，能夠根據加工方式在絕緣體和導電體之間切換。\n \
其分子結構使它擁有非凡的適應性，並成為高級科技技術的必備材療，從複雜的建築系統到專業元件的製造。\n 
status.asthosus-26z-13-item-tablet-crosium.details = 項目 R-013：「綠曜石」運用報告\n\n \
「綠曜石」是阿斯托薩斯科技史上最引人注目、最實用的材料之一。\n \
「綠曜石」在「綠曜石合成器」中被製造，將「黑曜石」、「氣壓」和「淨化綠洲水」結合在一起，形成一種具有獨特特性的複合材料。\n\n \
「綠曜石」真正的優勢在於它能同時具有絕緣性和導電性，取決於怎麼加工它。\n \
這種雙重特性使得「綠曜石」在先進設備中有無法估計的高價值，尤其是需要特定電極特性的設計。\n \
「綠曜石」也能使用於生產專門元件，其處理電力和絕緣的能力對先進科技至關重要。\n \
雖然「綠曜石」相較於其他高階材料相當穩定，但其生產過程必須嚴格控管。\n\n \
 - 特魯米爾 資源分析檔案 No.13

status.asthosus-26z-14-item-tablet-vesmonium.name = 資源項目「鋇導體」
status.asthosus-26z-14-item-tablet-vesmonium.description = 產地：\n\n \
「鋇導體」是由「鋇導體紡織器」製作，將「褐煤」、「重晶石」、「氣壓」、「重晶石流體」在精密控制下結合。\n \
這種獨特的混合物形成一種同時具有帶電性、易燃性和放射性的材料，常用於高級建設、防禦結構和加工技術。\n\n\
成分：\n\n \
「鋇導體」是一種高反應性材料，透過複雜的加工混合揮發性材料形成。\n \
其些微的帶電、易燃和放射性使其成為高科技發展的關鍵材料，但管理起來也十分危險。\n 
status.asthosus-26z-14-item-tablet-vesmonium.details = 項目 R-014：「鋇導體」運用報告\n\n \
「鋇導體」是一種混合物，由「鋇導體紡織器」使用「褐煤」、「重晶石」、「氣壓」、「重晶石流體」組合製造。\n \
生產出來的材料在帶電、易燃和放射之間達到巧妙的平衡，使其在高級建設、防禦系統和高級別科技中特別有價值。\n\n \
它能夠生產少量電荷，自身又是易燃物，使其作為能源生產材料、防禦材料和爆破材料都有巨大的成效。\n \
然而，豐富的特性也帶來巨大的風險，因此在將「鋇導體」融入任何設備技術時，都需要謹慎處理。\n \
尤其是它的放射性和揮發性，靠近某些生態域時額外危險。\n\n \
 - 特魯米爾 資源分析檔案 No.14

status.asthosus-26z-15-item-tablet-draysten.name = 資源項目「鋇超導體」
status.asthosus-26z-15-item-tablet-draysten.description = 產地：\n\n \
「鋇超導體」是由「鋇超導體熔爐」製作，以高度先進的技術將「鋇導體」混合「奈米氣冷劑」並加熱，最終製成的合金。\n \
考慮到其生產過程的繁瑣程度、尤其是它過於昂貴的材料，「鋇超導體」是一種極其貴重的成品。\n\n\
成分：\n\n \
「鋇超導體」是一種微帶電並能夠承受高熱能的合金，由「鋇導體」和「奈米氣冷劑」在極高的溫度下融合而成。\n \
它兼具電荷、爆炸性和中等的放射性，是建造高級建築和單位的不二人選。\n 
status.asthosus-26z-15-item-tablet-draysten.details = 項目 R-015：「鋇超導體」運用報告\n\n \
「鋇超導體」象徵著阿斯托薩斯製造合金的技術頂點，這種高度先進的材料是在「鋇超導體熔爐」中生產的。\n \
「鋇超導體熔爐」將「鋇導體」（一種具有多種特性成分的複合材料）、「奈米氣冷劑」在高熱環境下結合起來。\n \
製造出來的合金具有龐大的質量、傳導並融化周圍物質的高熱量和爆炸性，使其成為科技先端最為不可或缺的素材。\n\n \
然而，要生產「鋇超導體」需要投入大量的資源，並且「鋇導體」本身也需要大量資源和生產設施的協作，這進一步提升了生產的成本和複雜程度。\n \
「鋇超導體」爆炸性的潛力和質量，使其成為製造強大防禦設施、最先進的裝甲和武器的理想選擇。\n\n \
 - 特魯米爾 資源分析檔案 No.15

status.asthosus-26z-16-liquid-tablet-pressure.name = 資源項目「氣壓」
status.asthosus-26z-16-liquid-tablet-pressure.description = 產地：\n\n \
「氣壓」是阿斯托薩斯最重要、也是最常見的資源之一，為許多機械、發電裝置和其它維生設備提供動力。\n \
無論是從「地熱坑口」、或是使用「氣壓缸」蒐集，它都是無數作業現場的命脈。\n\n\
成分：\n\n \
「氣壓」在臨界狀態下是一種氣態物質，經由外部控制後釋放動能推力，並轉換為可利用的能量。\n \
它是許多阿斯托薩斯的機器、動力裝置和能源系統的運行必需品，一般儲存在能夠承受高壓的容器中、或用於即時流程以驅動大多科技。\n \
盡管在管理不當的情況下，它可能會引發災難性的爆炸，但它仍然是阿斯托薩斯工業不可或缺的基石。\n 
status.asthosus-26z-16-liquid-tablet-pressure.details = 項目 R-016：「氣壓」利用報告\n\n \
「氣壓」不僅僅是一種必須能源，更是驅動阿斯托薩斯眾多科技設備的引擎。\n \
從渦輪機到大型能源生產設施，「氣壓」對於從這顆星球不穩定的環境中獲取穩定動力來源，發揮了至關重要的作用。\n \
作為一種氣態資源，「氣壓」必須謹慎管理、儲存和使用，因為即使是來自外部細小的晃動，也有可能導致災難性的爆炸。\n\n \
雖然它完全不可燃，但是錯誤管理導致其連接的設備爆炸，依舊是無人樂見的狀況。在任何環境中都必須採取高安全性的防範措施。\n \
這種氣體在發電設施「氣壓渦輪」的運用上尤其重要，即使是在阿斯托薩斯最險惡的環境裡，都能產出非常高效率的電量。\n \
即使它很容易就會揮發，不過在設備的操作流程卻不能小覷。遵守規範運用「氣壓」，是維持技術主導地位的關鍵。\n\n \
 - 特魯米爾 資源分析檔案 No.16

status.asthosus-26z-17-liquid-tablet-sif4.name = 資源項目「四氟化矽」
status.asthosus-26z-17-liquid-tablet-sif4.description = 產地：\n\n \
「四氟化矽」是一種高度揮發的氣體，雖然危險卻也是各種先進阿斯托薩斯系統的必要組成部分，尤其是在武器和資源精煉的製程中。\n \
「四氟化矽」主要存在於研究和工業設施中，對於維持某些高能量系統的效率和安全至關重要。\n \
這種氣體本身是來自阿斯托薩斯「地熱坑口」配合「地熱蒐集機」採集。\n\n\
成分：\n\n \
「四氟化矽」是一種氣態化合物，與水和濕氣高度反應性極強，如果處理不當，可能會造成嚴重的損害。\n \
盡管「四氟化矽」具有毒性，但它在砲塔的冷卻過程、和某些資源精煉技術中，發揮著至關重要的作用。其特性使它能有效的吸收和發散熱量。\n \
它的危險性不僅僅在於對其他物質的反應性，處在高溫或不當儲存空間時也有可能發生爆炸。\n 
status.asthosus-26z-17-liquid-tablet-sif4.details = 項目 R-017：「四氟化矽」處理協議\n\n \
「四氟化矽」因為其極高的揮發性和危險性，時至今仍是最難管裡的物質之一。\n \
它通常用於高能量設備(例如砲塔或煉油廠)的冷卻系統，在維持安全溫度方面發揮無可取代的功效。這種氣體吸收熱能的能力，使其非常適合這些應用。\n\n \
但其高反應性成分意味著，即使只是微量接觸到不當的環境中，也會導致災難性的後果。\n \
此外，始終都必須考慮其在壓力下的爆炸傾向。因此，必須具備專門的設備和強化的安全規範才能使用。\n \
盡管有這些風險，它仍然是高級資源加工和砲塔操作最不可或缺的化合物之一。\n\n \
 - 特魯米爾 資源分析檔案 No.17

status.asthosus-26z-18-liquid-tablet-oasis-water.name = 資源項目「綠洲水」
status.asthosus-26z-18-liquid-tablet-oasis-water.description = 產地：\n\n \
「綠洲水」是一種稀少而重要的液體，取自阿斯托薩斯「荒漠」生態域的綠洲。\n \
這些綠洲數量稀少、分佈零散，是這片險峻的旱地中唯一重要的天然儲水場。\n\n\
成分：\n\n \
「綠洲水」的獨特之處，在於它的礦物質含量異常高，這使它具有不同於普通水分的特性。高礦物質含量提高了水的沸點，使其在阿斯托薩斯極端的環境下不會立刻蒸發。\n \
因此「綠洲水」對阿斯托薩斯的設備而言，是相當重要的冷卻劑，尤其一般的水會因為蒸發過快而難以使用。\n \
其高礦物質含量也使它成為一種高效率的熱導體，能夠比一般液體更有效率的吸熱和散熱。\n 
status.asthosus-26z-18-liquid-tablet-oasis-water.details = 項目 R-018：「綠洲水」取用報告\n\n \
「綠洲水」的高礦物質含量使其有別於一般的水，對於阿斯托薩斯上的冷卻系統非常重要。\n \
獨特的礦物質組成使其能夠忍受星球的酷熱而不會立即蒸發，這是其作為工業用冷卻劑發揮作用的關鍵點。\n\n \
由於這種成分，它可以在到達沸點前吸收大量熱能，這使其在維持機械和發電設施的溫度上非常有效，尤其又是這樣溫度非常極端的沙漠環境。\n \
然而，「綠洲水」的稀少性使其產生一種微妙的供需平衡，必須以持續但不浪費的方式提取和利用、防止這種寶貴的資源枯竭。\n\n \
 - 特魯米爾 資源分析檔案 No.18

status.asthosus-26z-19-liquid-tablet-purified-water.name = 資源項目「淨化綠洲水」
status.asthosus-26z-19-liquid-tablet-purified-water.description = 產地：\n\n \
「淨化綠洲水」源自阿斯托薩斯「荒漠」生態域中富含礦物質的「綠洲水」。\n \
經過萃取，「綠洲水」過濾掉任何汙染物，確保它只留下最高品質的液體。\n\n\
成分：\n\n \
「淨化綠洲水」是使用專門過濾設備精心篩選的成果。這個過程能夠去除雜質，使水保持在純淨狀態，非常適合使用在各種技術上。\n \
「淨化綠洲水」在維持高礦物質含量的同時，去除掉「綠洲水」的天然汙染物。\n \
其改良的成分增強了作為優質冷卻劑的用途，使它在精密機械和先進系統中更加有效。\n 
status.asthosus-26z-19-liquid-tablet-purified-water.details = 項目 R-019：「淨化綠洲水」應用報告\n\n \
「淨化綠洲水」是一種寶貴的資源，經過過濾後，達到先進技術應用的嚴格標準。\n \
其富含礦物質的成分中已經不含有無用的雜質，使其有優於一般「綠洲水」的沸點和冷卻劑效果。\n\n \
水的純度也使它成為精密技術的理想選擇，例如反應爐和更好的渦輪機系統。對於這些高級設備，即使是微量的汙染物也有可能導致故障。\n \
盡管純度和效率都有所提高，但「淨化綠洲水」依舊和尚未過濾的「綠洲水」一樣稀少缺乏，因此在任何操作上都絕不容許浪費。\n\n \
 - 特魯米爾 資源分析檔案 No.19

status.asthosus-26z-20-liquid-tablet-liquid-barite.name = 資源項目「重晶石流體」
status.asthosus-26z-20-liquid-tablet-liquid-barite.description = 產地：\n\n \
「重晶石流體」是一種極其不穩定、具有強烈放射性的「重晶石」，只有在極端環境下才會出現。\n \
這種液態的「重晶石」能夠迅速擴散，並且對任何接觸到的物體造成損害。其腐蝕性和放射性使其成為阿斯托薩斯上最危險的液體之一。\n \
然而，當「重晶石流體」經過「重晶石冷卻器」的加工處理後，可以重新固化成固態的「重晶石」，這是用於高級建設和技術的有用材料。\n\n\
成分：\n\n \
「重晶石流體」保留了固態「重晶石」的許多特性，但處在更不穩定的狀態。\n \
高放射性的特性使其在接受任何操作時都極為危險，它隨時都在發出微弱但不間斷的輻射場。任何與「重晶石流體」接觸的物體都不得不暴露在這種輻射中，並且因此受到損害。\n \
其高黏稠度和易爆炸性使其具有非常大量的潛在危險。\n 
status.asthosus-26z-20-liquid-tablet-liquid-barite.details = 項目 R-020：「重晶石流體」危害報告\n\n \
「重晶石流體」因為其高揮發性和放射性，對許多設備都是一大威脅。如果控制不當，它會蔓延到整個環境，造成巨大的破壞。\n\n \
這種物質難以控制，但只要使用適當的冷卻技術，它就能重新凝固成「重晶石」，並可以成為先進建設和防禦系統的材料。\n \
然而，安全處理「重晶石流體」需要專門的設備，例如「重晶石冷卻器」，這類設備是將其轉化為可用資源的必須條件。\n\n \
 - 特魯米爾 資源分析檔案 No.20

status.asthosus-26z-21-liquid-tablet-nontragen.name = 資源項目「奈米氣冷劑」
status.asthosus-26z-21-liquid-tablet-nontragen.description = 產地：\n\n \
「奈米氣冷劑」是一種複雜且高度先進的氣體，透過獨特的製成生產，包含對「綠洲水」和「黑曜石」粉末加壓。\n \
這種氣體在阿斯托薩斯最先端的冷卻系統和科技中，扮演不可或缺的角色。其獨特的特性在極高效利用上具有不可估量的價值，尤其是在極端的溫度環境下。\n \
「奈米氣冷劑」因為其熱穩定性而受到廣泛認可，這使得它能夠在需要恆定、受控溫度環境的系統中擔任強大的冷卻劑。\n\n\
成分：\n\n \
「奈米氣冷劑」是一種具有獨特熱反應特徵的氣體，使其成為管理最先進機械和設備產生熱量的關鍵成分。\n \
合成過程中，需要在高壓環境下將「綠洲水」和「黑曜石」粉末混合，從而產生一種具有驚人熱容量和穩定冷卻效果的氣體。\n \
它能夠承受高溫，並調節系統中經常過熱的設備。\n 獨特的成分組合賦予「奈米氣冷劑」微妙但明顯的顏色和紋理，這也是其與眾不同之處。\n 
status.asthosus-26z-21-liquid-tablet-nontragen.details = 項目 R-021：「奈米氣冷劑」綜合報告\n\n \
「奈米氣冷劑」的生產是一個極為精密的作業，需要精確的溫度和壓力控制。\n \
它在最先進的設備系統中作用巨大，尤其是像「輻射遼原」和「火成岩」這種需要應付極端高溫和持續性威脅的生態域中。\n\n \
這種氣體是一種高效率冷卻劑，特別適合使用在需要高續航力的先進機械和反應爐冷卻。\n \
此外「奈米氣冷劑」在最先進的生產作業中，尤其是最先端合金材料的研發發揮不容小覷的效用。\n\n \
